services:
  backend:
    build: ./backend
    ports:
      - "8010:8010"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
      - ./backend/temp:/app/temp
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --port 3020"
    ports:
      - "3020:3020"
    volumes:
      - ./frontend:/app
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8010
